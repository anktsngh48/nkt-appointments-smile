<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile Dental Hospital</title>
<style>
#preloader{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#f4f6f9;z-index:9999;
  display:flex;justify-content:center;align-items:center;text-align:center;
}
#preloader p{
  max-width:420px;margin:auto;font-size:18px;font-weight:700;
  color:#007bff;line-height:1.6;
}
body{font-family:Segoe UI,sans-serif;margin:0;background:#f4f6f9;}
.header{
  background:#007bff;color:white;padding:18px;
  text-align:center;font-size:22px;font-weight:600;
  cursor:pointer;user-select:none;
}
.header span{display:block;font-size:14px;font-weight:400;margin-top:3px;}
.container{padding:20px;max-width:600px;margin:auto;}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.08);}
label{font-weight:600;display:block;margin-top:15px;}

/* Doctor buttons */
.doctorSection{display:flex;align-items:flex-start;gap:12px;margin-top:4px;}
.doctorButtons{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;}
.doctorButtons button{
  width:120px;height:60px;border:1px solid #007bff;background:white;
  border-radius:8px;cursor:pointer;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  font-size:13px;line-height:1.3;
}
.doctorButtons button span{font-size:11px;}
.doctorButtons button.selected{background:#007bff;color:white;}
#doctorImage{width:100px;height:130px;object-fit:cover;border-radius:6px;display:none;}

/* Clinic buttons */
.clinicButtons{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.clinicButtons button{
  border:1px solid #007bff;background:white;border-radius:6px;
  padding:8px 12px;font-size:13px;cursor:pointer;
}
.clinicButtons button.selected{background:#007bff;color:white;}

/* Inputs */
input,select{
  width:100%;padding:12px;margin-top:6px;border-radius:8px;
  border:1px solid #ddd;font-size:15px;box-sizing:border-box;
}
input.err{border-color:#dc3545;}
.phone-hint{font-size:12px;color:#888;margin-top:3px;}
.phone-hint.err{color:#dc3545;}

/* Token display */
.tokenInfo{
  margin-top:15px;font-weight:bold;text-align:center;
  font-size:16px;padding:10px;border-radius:8px;
}
.tokenInfo.avail{color:#007bff;background:#e8f0fe;}
.tokenInfo.full{color:#dc3545;background:#fdecea;}

/* Book button — base is grey/disabled; specific states override */
#bookBtn{
  width:100%;padding:14px;margin-top:16px;border-radius:8px;
  border:none;color:white;font-size:15px;font-weight:600;
  cursor:not-allowed;background:#aaa;transition:background .15s;
}
#bookBtn.ready{background:#28a745;cursor:pointer;}
#bookBtn.chk{background:#f0a500;cursor:not-allowed;}
#bookBtn.dup{background:#dc3545;cursor:not-allowed;}
#bookBtn.noslot{background:#dc3545;cursor:not-allowed;}
#bookBtn.booking{background:#f0a500;cursor:not-allowed;}
#bookBtn.booked{background:#28a745;cursor:not-allowed;}  /* green but disabled */

/* Status message */
#statusMsg{
  margin-top:10px;text-align:center;font-size:14px;
  font-weight:600;min-height:18px;padding:4px;
}
#statusMsg.success{color:#28a745;}
#statusMsg.err{color:#dc3545;}
#statusMsg.warn{color:#e67e22;}

/* Download button — hidden until booking confirmed */
#downloadBtn{
  display:none;width:100%;padding:11px;margin-top:8px;
  border-radius:8px;border:2px solid #007bff;background:white;
  color:#007bff;font-size:14px;font-weight:600;cursor:pointer;
  box-sizing:border-box;
}

/* Hidden admin */
.hiddenInput{opacity:0;position:fixed;top:-9999px;left:-9999px;height:1px;width:1px;pointer-events:none;}
</style>
</head>
<body>

<div id="preloader">
  <p>
    नित्यमध्मान तां तांस्तु व्याधिभिश्च विवर्जितः।<br>
    रसैश्च दन्तमूलानां रूक्षैराचाम्य विक्रियाम्॥
  </p>
</div>

<div class="header" id="headerBar">
  Smile Dental Hospital
  <span id="headerAddress"></span>
</div>

<input type="password" id="adminInput" class="hiddenInput" autocomplete="off">

<div class="container">
  <div class="card">

    <label>Doctor</label>
    <div class="doctorSection">
      <div class="doctorButtons" id="doctorButtons"></div>
      <img id="doctorImage" alt="Doctor">
    </div>

    <label>Clinic</label>
    <div class="clinicButtons" id="clinicButtons"></div>

    <label>Name</label>
    <input id="userName" type="text" placeholder="Full Name">

    <label>Phone</label>
    <input id="userPhone" type="tel" placeholder="10-digit Mobile Number" maxlength="10" inputmode="numeric">
    <div class="phone-hint" id="phoneHint">Enter 10-digit number</div>

    <label>Address</label>
    <input id="userAddress" type="text" placeholder="Your Address">

    <label>Date</label>
    <select id="dateSelect"></select>

    <div class="tokenInfo avail" id="tokenDiv">Token Available: —</div>

    <button id="bookBtn" type="button" disabled>Book Appointment</button>
    <div id="statusMsg"></div>
    <button id="downloadBtn" type="button">⬇ Download Booking Receipt</button>

  </div>
</div>

<script>
// ── REPLACE WITH YOUR WEB APP URL ───────────────────────────────
const scriptURL = "https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";
// ────────────────────────────────────────────────────────────────

let settingsData         = [];
let selectedDoctor       = "";
let selectedClinic       = "";
let selectedClinicAddress= "";
let adminPassword        = "";
let slotLimits           = {};
// States: idle | checking | ready | duplicate | full | booking | done
let bookingState         = "idle";
let checkTimer           = null;
let slotsAvailable       = true;
let tokenChecking        = false;
let lastBooking          = null;

const $doctor  = document.getElementById("doctorButtons");
const $clinic  = document.getElementById("clinicButtons");
const $img     = document.getElementById("doctorImage");
const $name    = document.getElementById("userName");
const $phone   = document.getElementById("userPhone");
const $address = document.getElementById("userAddress");
const $date    = document.getElementById("dateSelect");
const $token   = document.getElementById("tokenDiv");
const $btn     = document.getElementById("bookBtn");
const $hdr     = document.getElementById("headerAddress");
const $adm     = document.getElementById("adminInput");
const $status  = document.getElementById("statusMsg");
const $hint    = document.getElementById("phoneHint");
const $dlBtn   = document.getElementById("downloadBtn");

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener("load", () => {
  setTimeout(() => { document.getElementById("preloader").style.display = "none"; }, 5000);
  loadSettings();
});

// ── SETTINGS ──────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const r = await fetch(scriptURL + "?action=getSettings");
    settingsData = await r.json();
    settingsData.forEach(row => {
      if (row[0] === "AdminPassword") adminPassword = String(row[1]);
      if (row[0] === "SlotLimit")
        slotLimits[row[1].trim() + "||" + row[2].trim()] = Number(row[3]) || 0;
    });
    setupDates();
    setupDoctors();
    setupClinics();
  } catch(e) {
    setStatus("Failed to load settings. Please refresh.", "err");
  }
}

// ── DATES ─────────────────────────────────────────────────────────
function setupDates() {
  const d0 = new Date(), d1 = new Date(d0.getTime() + 86400000);
  [d0, d1].forEach(d => {
    const o = document.createElement("option");
    o.value = o.text = fmtDate(d);
    $date.appendChild(o);
  });
  $date.addEventListener("change", onSelChange);
}
function fmtDate(d) {
  return String(d.getDate()).padStart(2,"0") + "-" +
         String(d.getMonth()+1).padStart(2,"0") + "-" + d.getFullYear();
}

// ── DOCTORS ───────────────────────────────────────────────────────
function setupDoctors() {
  settingsData.filter(r => r[0] === "Doctor").forEach((d, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.innerHTML = d[1] + "<span>" + (d[4]||"") + "</span>";
    b.addEventListener("click", () => {
      selectedDoctor = d[1].trim();
      $img.src = d[2] || "";
      $img.style.display = d[2] ? "block" : "none";
      Array.from($doctor.children).forEach(x => x.classList.remove("selected"));
      b.classList.add("selected");
      onSelChange();
    });
    $doctor.appendChild(b);
    if (i === 0) b.click();
  });
}

// ── CLINICS ───────────────────────────────────────────────────────
function setupClinics() {
  settingsData.filter(r => r[0] === "Clinic").forEach((c, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.innerText = c[1];
    b.addEventListener("click", () => {
      selectedClinic = c[1].trim();
      selectedClinicAddress = (c[2] || "").trim();
      $hdr.innerText = selectedClinicAddress;
      Array.from($clinic.children).forEach(x => x.classList.remove("selected"));
      b.classList.add("selected");
      onSelChange();
    });
    $clinic.appendChild(b);
    if (i === 0) b.click();
  });
}

// ── PHONE ─────────────────────────────────────────────────────────
$phone.addEventListener("keydown", e => {
  const ok = ["Backspace","Delete","Tab","ArrowLeft","ArrowRight","Home","End"];
  if (!ok.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
});
$phone.addEventListener("input", () => {
  $phone.value = $phone.value.replace(/\D/g,"").slice(0,10);
  const len = $phone.value.length;
  if (len === 0) {
    $hint.textContent = "Enter 10-digit number";
    $hint.className = "phone-hint";
    $phone.classList.remove("err");
  } else if (len < 10) {
    $hint.textContent = len + "/10 digits";
    $hint.className = "phone-hint err";
    $phone.classList.add("err");
  } else {
    $hint.textContent = "✓ Valid";
    $hint.className = "phone-hint";
    $phone.classList.remove("err");
  }
  onFormInput();
});
$name.addEventListener("input", onFormInput);
$address.addEventListener("input", onFormInput);

function phoneValid() { return /^\d{10}$/.test($phone.value); }

// ── SELECTION CHANGE (doctor / clinic / date) ─────────────────────
function onSelChange() {
  // Once booked, changing selection does nothing until user edits form fields
  if (bookingState === "done" || bookingState === "booking") return;
  bookingState = "idle";
  clearStatus();
  refreshToken(); // refreshToken calls debounceCheck() in its finally
}

// ── FORM INPUT ────────────────────────────────────────────────────
// After a confirmed booking, editing ANY field treats this as a new booking —
// full duplicate/slot check runs again from scratch.
function onFormInput() {
  if (bookingState === "booking") return;
  if (bookingState === "done") {
    // User is entering new patient details — start fresh
    // Keep download button and status message visible (previous booking record)
    bookingState = "idle";
    // Re-show token div for new booking
    $token.style.display = "";
  }
  if (bookingState === "duplicate") clearStatus();
  bookingState = "idle";
  debounceCheck();
}

// ── DEBOUNCE ──────────────────────────────────────────────────────
function debounceCheck() {
  clearTimeout(checkTimer);
  checkTimer = setTimeout(runCheck, 450);
}

// ── MAIN CHECK ────────────────────────────────────────────────────
// This runs automatically whenever the form changes.
// It shows "Duplicate Appointment" BEFORE the user tries to book.
async function runCheck() {
  if (bookingState === "booking" || bookingState === "done") return;

  // Wait for token fetch to finish
  if (tokenChecking) { debounceCheck(); return; }

  // Slots full — stop here
  if (!slotsAvailable) { setState("full"); return; }

  const allFilled = $name.value.trim() && phoneValid() && $address.value.trim();
  if (!allFilled) {
    setState("idle");
    return;
  }

  // All fields filled → run live duplicate check
  setState("checking");

  try {
    const r = await fetch(
      scriptURL +
      "?action=checkDuplicate" +
      "&name="   + encodeURIComponent($name.value.trim()) +
      "&phone="  + encodeURIComponent($phone.value.trim()) +
      "&clinic=" + encodeURIComponent(selectedClinic) +
      "&date="   + encodeURIComponent($date.value)
    );
    const d = await r.json();

    if (!slotsAvailable) { setState("full"); return; }

    if (d.duplicate) {
      // Show "Duplicate Appointment" on button BEFORE user clicks book
      setState("duplicate");
      setStatus("An appointment for this name & phone already exists at this clinic on the selected date.", "warn");
    } else {
      setState("ready");
      clearStatus();
    }
  } catch(e) {
    if (!slotsAvailable) { setState("full"); return; }
    setState("ready"); // fail open on network error
  }
}

// ── TOKEN REFRESH ─────────────────────────────────────────────────
async function refreshToken() {
  if (!selectedDoctor || !selectedClinic) return;
  tokenChecking = true;
  $token.textContent = "Checking availability…";
  $token.className   = "tokenInfo avail";

  try {
    const r = await fetch(
      scriptURL +
      "?action=getToken" +
      "&doctor=" + encodeURIComponent(selectedDoctor) +
      "&clinic=" + encodeURIComponent(selectedClinic) +
      "&date="   + encodeURIComponent($date.value)
    );
    const d      = await r.json();
    const maxTok = Number(d.maxToken) || 0;
    const limit  = slotLimits[selectedDoctor + "||" + selectedClinic] || 0;

    if (limit > 0 && maxTok >= limit) {
      slotsAvailable     = false;
      $token.textContent = "No Booking Available";
      $token.className   = "tokenInfo full";
      setStatus("All slots are full for this doctor, clinic & date.", "err");
      setState("full");
    } else {
      slotsAvailable     = true;
      $token.textContent = "Token Available: " + (maxTok + 1);
      $token.className   = "tokenInfo avail";
      if (bookingState === "full") { bookingState = "idle"; clearStatus(); }
    }
  } catch(e) {
    slotsAvailable     = true;
    $token.textContent = "Token: —";
  } finally {
    tokenChecking = false;
    debounceCheck(); // run button check once token result is known
  }
}

// ── BOOK ──────────────────────────────────────────────────────────
$btn.addEventListener("click", async () => {
  if (bookingState !== "ready") return;
  setState("booking");

  const params = new URLSearchParams();
  params.append("name",    $name.value.trim());
  params.append("phone",   $phone.value.trim());
  params.append("doctor",  selectedDoctor);
  params.append("clinic",  selectedClinic);
  params.append("address", $address.value.trim());
  params.append("date",    $date.value);

  try {
    const r = await fetch(scriptURL, { method: "POST", body: params });
    const d = await r.json();

    if (d.status === "success") {
      lastBooking = {
        hospital:      "Smile Dental Hospital",
        clinic:        selectedClinic,
        clinicAddress: selectedClinicAddress,
        doctor:        selectedDoctor,
        name:          $name.value.trim(),
        phone:         $phone.value.trim(),
        address:       $address.value.trim(),
        date:          $date.value,
        token:         d.token,
        timestamp:     new Date().toLocaleString("en-IN")
      };

      setState("done");
      // Hide token display after successful booking
      $token.style.display = "none";
      setStatus("✓ Appointment booked successfully! Token: " + d.token, "success");
      // Show download button
      $dlBtn.style.display = "block";

    } else if (d.status === "duplicate") {
      setState("duplicate");
      setStatus("Duplicate appointment — this name & phone are already booked at this clinic on the selected date.", "warn");
    } else if (d.status === "full") {
      slotsAvailable     = false;
      $token.textContent = "No Booking Available";
      $token.className   = "tokenInfo full";
      setState("full");
      setStatus("All slots are full for this doctor, clinic & date.", "err");
    } else {
      setState("ready");
      setStatus("Server error. Please try again.", "err");
    }
  } catch(e) {
    setState("ready");
    setStatus("Network error. Please check your connection.", "err");
  }
});

// ── DOWNLOAD RECEIPT ──────────────────────────────────────────────
$dlBtn.addEventListener("click", () => {
  if (!lastBooking) return;
  buildAndDownloadReceipt(lastBooking);
});

function buildAndDownloadReceipt(b) {
  const SCALE  = 3;    // 3× for crisp high-res PNG
  const W      = 240;  // narrow ATM-receipt width (pixels)
  const TH     = 16;   // tooth height for zigzag cut marks
  const PAD    = 12;

  // Measure content height first
  const lines  = buildReceiptLines(b);
  let contentH = TH + 8;
  for (const l of lines) contentH += measureLineH(l);
  contentH += TH + 8;

  const H = contentH;

  const canvas = document.createElement("canvas");
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext("2d");
  ctx.scale(SCALE, SCALE);

  // Shadow/background outside the receipt shape
  ctx.fillStyle = "#c8c8c8";
  ctx.fillRect(0, 0, W, H);

  // Build zigzag clip path
  const tW     = 10;
  const nTeeth = Math.floor(W / tW);
  const tStart = (W - nTeeth * tW) / 2;

  ctx.save();
  ctx.beginPath();

  // Top edge: zigzag cuts INTO the paper (teeth point upward)
  ctx.moveTo(0, TH);
  for (let i = 0; i < nTeeth; i++) {
    const x0 = tStart + i * tW;
    ctx.lineTo(x0 + tW / 2, 0);
    ctx.lineTo(x0 + tW, TH);
  }
  ctx.lineTo(W, TH);
  ctx.lineTo(W, H - TH);

  // Bottom edge: zigzag cuts INTO the paper (teeth point downward)
  for (let i = nTeeth; i > 0; i--) {
    const x0 = tStart + i * tW;
    ctx.lineTo(x0 - tW / 2, H);
    ctx.lineTo(x0 - tW, H - TH);
  }
  ctx.lineTo(0, H - TH);
  ctx.closePath();
  ctx.clip();

  // Paper fill — warm off-white thermal paper colour
  ctx.fillStyle = "#fefef9";
  ctx.fillRect(0, 0, W, H);

  // Subtle horizontal scan-line texture (thermal printer look)
  for (let yy = TH; yy < H - TH; yy += 3) {
    ctx.fillStyle = "rgba(0,0,0,0.008)";
    ctx.fillRect(0, yy, W, 1);
  }

  // Draw content
  let y = TH + 8;
  for (const line of lines) {
    y = drawReceiptLine(ctx, line, y, W, PAD);
  }

  ctx.restore();

  // Download
  const a = document.createElement("a");
  a.download = "Receipt_Token" + b.token + "_" + b.date + ".png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

// ── Receipt line definitions ──────────────────────────────────────
function buildReceiptLines(b) {
  const L = [];
  const g = (h)      => L.push({ type:"gap",  h });
  const d = ()       => L.push({ type:"dash" });
  const c = (text, size, bold, color) => L.push({ type:"center", text, size: size||9, bold: !!bold, color: color||"#222" });
  const row = (label, value) => L.push({ type:"row", label, value });

  g(4);
  c("SMILE DENTAL HOSPITAL", 12, true, "#000");
  g(4);
  c(b.clinic, 9, false, "#444");
  c(b.clinicAddress, 8, false, "#666");
  g(6);
  d();
  g(6);
  c("APPOINTMENT RECEIPT", 9, true, "#333");
  g(3);
  c(b.date, 9, false, "#555");
  g(8);
  c("TOKEN NO.", 8, false, "#888");
  g(2);
  c("#" + b.token, 36, true, "#000");
  g(8);
  d();
  g(8);
  row("DOCTOR",  b.doctor);
  g(4);
  row("PATIENT", b.name);
  g(4);
  row("PHONE",   b.phone);
  g(4);
  row("ADDRESS", b.address);
  g(4);
  row("DATE",    b.date);
  g(4);
  row("BOOKED",  b.timestamp);
  g(8);
  d();
  g(6);
  c("** APPOINTMENT CONFIRMED **", 8, true, "#000");
  g(4);
  c("Carry this receipt to your", 7.5, false, "#888");
  c("appointment", 7.5, false, "#888");
  g(10);

  return L;
}

// Measure line height for canvas pre-sizing (no actual drawing)
function measureLineH(l) {
  if (l.type === "gap")    return l.h || 6;
  if (l.type === "dash")   return 10;
  if (l.type === "center") return (l.size || 9) * 1.55;
  if (l.type === "row")    return 26;
  return 10;
}

// Draw one line, returns new y
function drawReceiptLine(ctx, l, y, W, PAD) {
  ctx.textBaseline = "top";

  if (l.type === "gap") return y + (l.h || 6);

  if (l.type === "dash") {
    ctx.font      = "8px monospace";
    ctx.fillStyle = "#bbb";
    ctx.textAlign = "center";
    ctx.fillText("- - - - - - - - - - - - - - - - - - - - - - - -", W / 2, y);
    return y + 10;
  }

  if (l.type === "center") {
    const fnt = (l.bold ? "bold " : "") + l.size + "px 'Courier New',monospace";
    ctx.font      = fnt;
    ctx.fillStyle = l.color || "#222";
    ctx.textAlign = "center";

    // Word-wrap
    const words = String(l.text).split(" ");
    let line = "", ly = y;
    const lineH = l.size * 1.35;
    for (const w of words) {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > W - PAD * 2 && line) {
        ctx.fillText(line, W / 2, ly);
        line = w; ly += lineH;
      } else line = test;
    }
    ctx.fillText(line, W / 2, ly);
    return ly + l.size * 1.55;
  }

  if (l.type === "row") {
    // Label on the left, value right-aligned with wrapping
    const labelW = 56;
    const valX   = PAD + labelW + 4;
    const valMaxW = W - PAD - valX;

    ctx.font      = "bold 8px 'Courier New',monospace";
    ctx.fillStyle = "#666";
    ctx.textAlign = "left";
    ctx.fillText(l.label, PAD, y);

    ctx.font      = "8px 'Courier New',monospace";
    ctx.fillStyle = "#111";

    const words = String(l.value || "").split(" ");
    let ln = "", ly = y;
    for (const w of words) {
      const test = ln ? ln + " " + w : w;
      if (ctx.measureText(test).width > valMaxW && ln) {
        ctx.textAlign = "right";
        ctx.fillText(ln, W - PAD, ly);
        ln = w; ly += 11;
      } else ln = test;
    }
    ctx.textAlign = "right";
    ctx.fillText(ln, W - PAD, ly);
    return Math.max(y + 14, ly + 12);
  }

  return y;
}

// ── STATE MACHINE ─────────────────────────────────────────────────
function setState(s) {
  bookingState   = s;
  $btn.disabled  = true;
  $btn.className = "";   // reset all state classes

  switch(s) {
    case "idle":
      $btn.innerText = "Book Appointment";
      break;
    case "checking":
      $btn.innerText = "Checking Appointment…";
      $btn.classList.add("chk");
      break;
    case "ready":
      $btn.innerText = "Book Appointment";
      $btn.classList.add("ready");
      $btn.disabled  = false;
      break;
    case "duplicate":
      $btn.innerText = "Duplicate Appointment";
      $btn.classList.add("dup");
      break;
    case "full":
      $btn.innerText = "No Slots Available";
      $btn.classList.add("noslot");
      break;
    case "booking":
      $btn.innerText = "Booking…";
      $btn.classList.add("booking");
      break;
    case "done":
      $btn.innerText = "✓ Appointment Booked";
      $btn.classList.add("booked");  // green, disabled
      break;
  }
}

function setStatus(msg, cls) { $status.textContent = msg; $status.className = cls; }
function clearStatus()       { $status.textContent = ""; $status.className = ""; }

// ── ADMIN ─────────────────────────────────────────────────────────
document.getElementById("headerBar").addEventListener("click", () => {
  $adm.value = ""; $adm.style.pointerEvents = "auto"; $adm.focus();
});
$adm.addEventListener("input", () => {
  if (adminPassword && $adm.value === adminPassword)
    window.location.href = "https://duckduckgo.com";
});
</script>
