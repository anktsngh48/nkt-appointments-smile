<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SMILE Dental Clinic</title>
</head>
<body>
    <div class="container">
        <h1>SMILE Dental Clinic</h1>
        <h2 id="doctorDropdown"></h2>
        <h3 id="clinicDropdown"></h3>
        <p id="addressDisplay"></p>
        <input type="text" id="userName" placeholder="Enter your name">
        <select id="dateSelect"></select>
        <img id="doctorImg" src="" alt="Doctor's Picture" style="display:none; width: 75%; height: auto;">
        <button id="submitBtn">Submit</button>
    </div>

    <div id="passwordPrompt" style="display:none;">
        <input type="password" id="adminPassword" placeholder="Enter Admin Password">
        <button id="passwordSubmit">Submit</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
