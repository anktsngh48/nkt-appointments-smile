<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:16px;
}

h2{
margin-top:0;
}

.doctorSection{
display:flex;
align-items:flex-start;
gap:12px;
}

.doctorLeft{
flex:1;
}

#doctorButtons button{
display:block;
width:100%;
padding:10px;
margin-bottom:6px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

#doctorButtons button.selected{
background:#007bff;
color:white;
}

#doctorQualifications{
font-size:14px;
margin-top:6px;
color:#333;
}

.doctorRight{
width:110px;
flex-shrink:0;
}

#doctorImage{
width:100%;
border-radius:6px;
display:none;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
}

#tokenAvailable{
margin-top:10px;
font-weight:bold;
font-size:16px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:#aaa;
}

</style>

</head>

<body>

<div class="container">

<h2>Book Appointment</h2>

<div class="doctorSection">

<div class="doctorLeft">

<div id="doctorButtons"></div>

<div id="doctorQualifications"></div>

</div>

<div class="doctorRight">

<img id="doctorImage">

</div>

</div>

<input type="date" id="dateSelect">

<input type="text" id="nameInput" placeholder="Patient Name">

<input type="tel" id="phoneInput" placeholder="Phone Number">

<div id="tokenAvailable"></div>

<button id="submitBtn" disabled>Submit</button>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[];
let appointmentsData=[];
let selectedDoctor="";

const doctorButtons=document.getElementById("doctorButtons");
const doctorQualifications=document.getElementById("doctorQualifications");
const doctorImage=document.getElementById("doctorImage");

const dateSelect=document.getElementById("dateSelect");
const nameInput=document.getElementById("nameInput");
const phoneInput=document.getElementById("phoneInput");

const tokenAvailable=document.getElementById("tokenAvailable");
const submitBtn=document.getElementById("submitBtn");



fetch(scriptURL)
.then(r=>r.json())
.then(data=>{
settingsData=data.settings;
setupDoctors();
fetchAppointments();
});



function setupDoctors(){

doctorButtons.innerHTML="";

settingsData
.filter(r=>r[0]==="Doctor")
.forEach(d=>{

const doctorName=d[1]||"";
const imageUrl=d[2]||"";
const qualification=d[3]||"";

const btn=document.createElement("button");
btn.textContent=doctorName;

btn.onclick=()=>{

selectedDoctor=doctorName;

doctorQualifications.textContent=qualification;

doctorImage.src=imageUrl;

doctorImage.style.display=imageUrl?"block":"none";

Array.from(doctorButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

checkInputs();

};

doctorButtons.appendChild(btn);

});

if(doctorButtons.firstChild){
doctorButtons.firstChild.click();
}

}



function fetchAppointments(){

fetch(scriptURL+"?action=getAppointments")
.then(r=>r.json())
.then(rows=>{

appointmentsData=[];

for(let i=1;i<rows.length;i++){

appointmentsData.push({

name:String(rows[i][0]||"").trim(),
phone:String(rows[i][1]||"").trim(),
doctor:rows[i][2],
date:String(rows[i][5]||"").trim(),
token:Number(rows[i][6])||0

});

}

updateToken();

});

}



function updateToken(){

const selectedDate=dateSelect.value;

let maxToken=0;

appointmentsData.forEach(a=>{

if(a.date===selectedDate){

if(a.token>maxToken){
maxToken=a.token;
}

}

});

tokenAvailable.innerText="Token: "+(maxToken+1);

checkInputs();

}



function checkInputs(){

submitBtn.disabled=!(
selectedDoctor &&
dateSelect.value &&
nameInput.value &&
phoneInput.value
);

}



dateSelect.onchange=updateToken;
nameInput.oninput=checkInputs;
phoneInput.oninput=checkInputs;



submitBtn.onclick=()=>{

const payload={

name:nameInput.value,
phone:phoneInput.value,
doctor:selectedDoctor,
date:dateSelect.value

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(()=>{

alert("Appointment saved");

location.reload();

});

};

</script>

</body>

</html>
