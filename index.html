<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smile Dental Hospital</title>

<style>

#preloader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6f9;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

#preloader p{
font-size:18px;
font-weight:700;
color:#007bff;
}

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
cursor:pointer;
}

.header span{
display:block;
font-size:14px;
font-weight:400;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

.doctorSection{
display:flex;
gap:12px;
}

.doctorButtons{
flex:1;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.doctorButtons button{
border:1px solid #007bff;
background:white;
border-radius:6px;
padding:6px 8px;
cursor:pointer;
font-size:12px;
text-align:left;
}

.doctorButtons button span{
display:block;
font-size:10px;
}

.doctorButtons button.selected{
background:#007bff;
color:white;
}

#doctorImage{
width:100px;
height:130px;
object-fit:cover;
border-radius:6px;
display:none;
}

.clinicButtons{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.clinicButtons button{
border:1px solid #007bff;
background:white;
border-radius:6px;
padding:8px 10px;
font-size:13px;
cursor:pointer;
}

.clinicButtons button.selected{
background:#007bff;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

#bookBtn{
width:100%;
padding:14px;
margin-top:20px;
border-radius:8px;
border:none;
background:#28a745;
color:white;
font-size:15px;
cursor:pointer;
}

#bookBtn:disabled{
background:#ccc;
}

.tokenInfo{
margin-top:15px;
font-weight:bold;
color:#007bff;
text-align:center;
}

</style>

</head>

<body>

<div id="preloader">
<p>
नित्यमध्मान तां तांस्तु व्याधिभिश्च विवर्जितः।
</p>
</div>

<div class="header" id="headerBar">
Smile Dental Hospital
<span id="headerAddress"></span>
</div>

<div class="container">
<div class="card">

<label>Doctor</label>

<div class="doctorSection">

<div class="doctorButtons" id="doctorButtons"></div>

<img id="doctorImage">

</div>

<label>Clinic</label>

<div class="clinicButtons" id="clinicButtons"></div>

<label>Name</label>
<input id="userName">

<label>Phone</label>
<input id="userPhone">

<label>Address</label>
<input id="userAddress">

<label>Date</label>
<select id="dateSelect"></select>

<div class="tokenInfo" id="tokenAvailable">
Token: -
</div>

<button id="bookBtn" disabled>
Book Appointment
</button>

</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[];
let adminPassword="";

let selectedDoctor="";
let selectedClinic="";
let selectedClinicAddress="";

const doctorButtons=document.getElementById("doctorButtons");
const clinicButtons=document.getElementById("clinicButtons");
const doctorImage=document.getElementById("doctorImage");

const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const userAddress=document.getElementById("userAddress");

const dateSelect=document.getElementById("dateSelect");
const tokenAvailable=document.getElementById("tokenAvailable");
const bookBtn=document.getElementById("bookBtn");
const headerAddress=document.getElementById("headerAddress");

window.onload=()=>{

setTimeout(()=>{
document.getElementById("preloader").style.display="none";
},2000);

loadSettings();

};

async function loadSettings(){

const res=await fetch(scriptURL+"?action=getSettings");
settingsData=await res.json();

settingsData.forEach(r=>{
if(r[0]==="AdminPassword"){
adminPassword=r[1];
}
});

setupDoctors();
setupClinics();
setupDates();

}

function setupDoctors(){

const doctors=settingsData.filter(r=>r[0]==="Doctor");

doctors.forEach(d=>{

const btn=document.createElement("button");

btn.innerHTML=d[1]+"<span>"+(d[4]||"")+"</span>";

btn.onclick=()=>{

selectedDoctor=d[1];

doctorImage.src=d[2]||"";
doctorImage.style.display=d[2]?"block":"none";

Array.from(doctorButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

updateToken();

};

doctorButtons.appendChild(btn);

});

}

function setupClinics(){

const clinics=settingsData.filter(r=>r[0]==="Clinic");

clinics.forEach(c=>{

const btn=document.createElement("button");

btn.innerText=c[1];

btn.onclick=()=>{

selectedClinic=c[1];
selectedClinicAddress=c[2];

headerAddress.innerText=selectedClinicAddress;

Array.from(clinicButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

updateToken();

};

clinicButtons.appendChild(btn);

});

}

function setupDates(){

const today=new Date();
const tomorrow=new Date(today.getTime()+86400000);

const dates=[today,tomorrow];

dates.forEach(d=>{

const opt=document.createElement("option");

opt.value=formatDate(d);
opt.text=opt.value;

dateSelect.appendChild(opt);

});

dateSelect.onchange=updateToken;

}

function formatDate(d){
return String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
}

async function updateToken(){

if(!selectedDoctor || !selectedClinic) return;

const date=dateSelect.value;

const res=await fetch(scriptURL+"?action=getToken&doctor="+encodeURIComponent(selectedDoctor)+"&clinic="+encodeURIComponent(selectedClinic)+"&date="+date);

const data=await res.json();

tokenAvailable.innerText="Token: "+data.token;

checkInputs();

}

[userName,userPhone,userAddress].forEach(el=>el.addEventListener("input",checkInputs));

function checkInputs(){

bookBtn.disabled=!(
userName.value &&
userPhone.value &&
userAddress.value &&
selectedDoctor &&
selectedClinic
);

}

bookBtn.onclick=async()=>{

const payload={
name:userName.value,
phone:userPhone.value,
doctor:selectedDoctor,
clinic:selectedClinic,
address:userAddress.value,
date:dateSelect.value
};

const res=await fetch(scriptURL,{
method:"POST",
body:JSON.stringify(payload)
});

const data=await res.json();

if(data.status==="duplicate"){
alert("Duplicate Appointment");
return;
}

if(data.status==="success"){
alert("Appointment booked. Token: "+data.token);
location.reload();
return;
}

alert("Server Error");

};

document.getElementById("headerBar").onclick=()=>{

const pass=prompt("Enter Admin Password");

if(pass===adminPassword){
window.location="https://duckduckgo.com";
}

};

</script>

</body>
</html>
