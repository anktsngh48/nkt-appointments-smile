<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#f6f6f6;
}

#topHeader{
background:#8B0000;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

#sanskrit{
text-align:center;
font-size:14px;
margin-top:6px;
}

.container{
padding:15px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

#doctors{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.docBtn{
flex:1;
min-width:120px;
padding:14px;
border-radius:8px;
border:none;
background:#ddd;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.docBtn.selected{
background:#8B0000;
color:white;
}

#docImage{
width:100%;
margin-top:15px;
display:none;
}

#token{
margin-top:15px;
font-weight:bold;
}

#bookBtn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
background:#ccc;
color:white;
font-size:16px;
border-radius:8px;
}

#bookBtn.enabled{
background:#8B0000;
cursor:pointer;
}

</style>
</head>

<body>

<div id="topHeader">NKT Clinic</div>

<div id="sanskrit">
धर्मो रक्षति रक्षितः
</div>

<div class="container">

<div id="doctors"></div>

<img id="docImage">

<label>Name</label>
<input id="name">

<label>Phone</label>
<input id="phone" maxlength="10" inputmode="numeric">

<label>Address</label>
<input id="address">

<label>Date</label>
<select id="date"></select>

<div id="token">Token Available: --</div>

<button id="bookBtn">Book Appointment</button>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec"

let selectedDoctor=""
let checking=false

document.getElementById("phone").addEventListener("input",function(){
this.value=this.value.replace(/\D/g,'').slice(0,10)
checkForm()
})

document.getElementById("name").addEventListener("input",checkForm)
document.getElementById("address").addEventListener("input",checkForm)

document.getElementById("date").addEventListener("change",checkForm)

function loadDoctors(){

fetch(scriptURL+"?action=getSettings")
.then(r=>r.json())
.then(data=>{

let doctors=data.doctors
let container=document.getElementById("doctors")

container.innerHTML=""

doctors.forEach((d,i)=>{

let btn=document.createElement("button")
btn.className="docBtn"
btn.innerText=d.name

btn.onclick=()=>{
selectDoctor(d,btn)
}

container.appendChild(btn)

if(i==0){
btn.click()
}

})

})
}

function selectDoctor(doc,btn){

selectedDoctor=doc.name

document.querySelectorAll(".docBtn").forEach(b=>b.classList.remove("selected"))
btn.classList.add("selected")

if(doc.image){
let img=document.getElementById("docImage")
img.src=doc.image
img.style.display="block"
}else{
document.getElementById("docImage").style.display="none"
}

loadDates()
checkForm()
}

function loadDates(){

fetch(scriptURL+"?action=getDates&doctor="+selectedDoctor)
.then(r=>r.json())
.then(data=>{

let d=document.getElementById("date")
d.innerHTML=""

data.forEach((dt,i)=>{

let opt=document.createElement("option")
opt.value=dt
opt.innerText=dt
d.appendChild(opt)

})

d.selectedIndex=0

updateToken()

})

}

function updateToken(){

let date=document.getElementById("date").value

fetch(scriptURL+"?action=getToken&doctor="+selectedDoctor+"&date="+date)
.then(r=>r.text())
.then(t=>{
document.getElementById("token").innerText="Token Available: "+t
})

}

function checkForm(){

if(checking) return

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let addr=document.getElementById("address").value

let btn=document.getElementById("bookBtn")

if(name && phone.length==10 && addr){

btn.classList.add("enabled")
btn.innerText="Book Appointment"

}else{

btn.classList.remove("enabled")
btn.innerText="Book Appointment"

}

}

document.getElementById("bookBtn").onclick=function(){

let btn=this

if(!btn.classList.contains("enabled")) return

checking=true
btn.innerText="Checking Appointment..."

let data={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
doctor:selectedDoctor,
date:document.getElementById("date").value
}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.text())
.then(res=>{

checking=false

if(res=="duplicate"){

alert("Duplicate entry found")

btn.innerText="Book Appointment"

}else{

alert("Appointment Booked")
location.reload()

}

})
}

document.getElementById("topHeader").onclick=function(){

let pass=prompt("Enter Password")

if(pass){

fetch(scriptURL+"?action=checkPassword&pass="+pass)
.then(r=>r.text())
.then(res=>{

if(res.startsWith("http")){
window.location=res
}

})

}

}

loadDoctors()

</script>

</body>
</html>
