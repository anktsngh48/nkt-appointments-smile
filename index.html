<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE Dental Clinic</title>

<style>
/* PRELOADER */
#preloader{
  position:fixed; inset:0;
  background:#f4f6f9;
  display:flex; align-items:center; justify-content:center;
  z-index:9999; text-align:center; padding:20px;
}
#preloader p{ font-size:18px; font-weight:700; color:#007bff; }

/* BODY */
body{ font-family:'Segoe UI',sans-serif; margin:0; background:#f4f6f9; }
body.loading{ overflow:hidden; }

.header{
  background:#007bff; color:white; padding:18px;
  text-align:center; font-size:22px; font-weight:600;
}
.header span{ display:block; font-size:14px; margin-top:4px; }

.container{ padding:20px; max-width:600px; margin:auto; }
.card{
  background:white; padding:25px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

label{ font-weight:600; margin-top:15px; display:block; }

/* DOCTOR */
.doctorSection{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:8px;
}
.doctorButtons{ flex:1; display:flex; flex-wrap:wrap; gap:8px; }
.doctorButtons button{
  padding:10px 14px; border-radius:6px;
  border:1px solid #007bff; background:white;
  cursor:pointer;
}
.doctorButtons button.selected{
  background:#007bff; color:white;
}
#doctorQualifications{
  margin-top:6px; font-size:14px; color:#444;
}
#doctorImage{
  width:100px; height:133px;
  border-radius:6px; object-fit:cover;
  display:none;
}

/* CLINIC */
.clinicButtons{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.clinicButtons button{
  padding:10px 14px; border-radius:6px;
  border:1px solid #007bff; background:white;
}
.clinicButtons button.selected{
  background:#007bff; color:white;
}

/* INPUTS */
input,select{
  width:100%; padding:14px;
  margin-top:6px; font-size:16px;
  border-radius:8px; border:1px solid #ddd;
}

/* BUTTON */
#bookBtn{
  width:100%; padding:14px; margin-top:20px;
  font-size:16px; border:none; border-radius:8px;
}
#bookBtn:disabled{ background:#ccc; color:white; }
#bookBtn.enabled{ background:#28a745; color:white; }
#bookBtn.duplicate{ background:#dc3545; color:white; }

.tokenInfo{
  margin-top:15px; font-weight:bold;
  text-align:center; color:#007bff;
}

/* MOBILE */
@media(max-width:480px){
  .doctorSection{ flex-direction:column; }
  #doctorImage{ width:80px; height:106px; }
}
</style>
</head>

<body class="loading">

<div id="preloader">
  <p>नित्यमध्मान तां तांस्तु व्याधिभिश्च विवर्जितः।</p>
</div>

<div class="header">
  SMILE Dental Clinic
  <span id="headerAddress"></span>
</div>

<div class="container">
<div class="card">

<label>Doctor</label>
<div class="doctorSection">
  <div>
    <div class="doctorButtons" id="doctorButtons"></div>
    <div id="doctorQualifications"></div>
  </div>
  <img id="doctorImage">
</div>

<label>Clinic</label>
<div class="clinicButtons" id="clinicButtons"></div>

<label>Name</label>
<input id="userName" type="text">

<label>Phone</label>
<input id="userPhone" type="tel">

<label>Date</label>
<select id="dateSelect"></select>

<div class="tokenInfo" id="tokenAvailable">Token: 1</div>
<button id="bookBtn" disabled>Book Appointment</button>

</div>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[], appointmentsData=[];
let selectedDoctor="", selectedClinic="";

const doctorButtons=document.getElementById("doctorButtons");
const clinicButtons=document.getElementById("clinicButtons");
const doctorImage=document.getElementById("doctorImage");
const doctorQualifications=document.getElementById("doctorQualifications");
const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const dateSelect=document.getElementById("dateSelect");
const bookBtn=document.getElementById("bookBtn");
const tokenAvailable=document.getElementById("tokenAvailable");
const headerAddress=document.getElementById("headerAddress");

window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("preloader").style.display="none";
    document.body.classList.remove("loading");
  },3000);
};

fetch(scriptURL+"?action=getSettings")
.then(r=>r.json())
.then(d=>{
  settingsData=d;
  setupDoctors();
  setupClinics();
  setupDates();
  fetchAppointments();
});

function setupDoctors(){
  settingsData.filter(r=>r[0]=="Doctor").forEach(d=>{
    const b=document.createElement("button");
    b.textContent=d[1];
    b.onclick=()=>{
      selectedDoctor=d[1];
      doctorQualifications.textContent=d[3]||"";
      doctorImage.src=d[2];
      doctorImage.style.display=d[2]?"block":"none";
      [...doctorButtons.children].forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
      checkInputs();
    };
    doctorButtons.appendChild(b);
  });
  doctorButtons.firstChild?.click();
}

function setupClinics(){
  settingsData.filter(r=>r[0]=="Clinic").forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c[1];
    b.onclick=()=>{
      selectedClinic=c[1];
      headerAddress.textContent=c[2];
      [...clinicButtons.children].forEach(x=>x.classList.remove("selected"));
      b.classList.add("selected");
      checkInputs();
    };
    clinicButtons.appendChild(b);
  });
  clinicButtons.firstChild?.click();
}

function setupDates(){
  const t=new Date();
  [0,1].forEach(i=>{
    const d=new Date(t.getTime()+i*86400000);
    const v=String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
    const o=document.createElement("option");
    o.value=v; o.textContent=i?`Tomorrow (${v})`:`Today (${v})`;
    dateSelect.appendChild(o);
  });
  dateSelect.onchange=()=>{updateToken();checkInputs();};
}

function fetchAppointments(){
  fetch(scriptURL+"?action=getAppointments")
  .then(r=>r.json())
  .then(rows=>{
    appointmentsData=rows.slice(1).map(r=>({
      name:r[0], phone:r[1], doctor:r[2],
      clinic:r[3], date:r[5], token:r[6]
    }));
    updateToken();
  });
}

function updateToken(){
  const d=dateSelect.value;
  const t=appointmentsData.filter(a=>a.date==d);
  const last=t.length?Math.max(...t.map(x=>+x.token)):0;
  tokenAvailable.textContent="Token: "+(last+1);
}

[userName,userPhone,dateSelect].forEach(e=>e.oninput=checkInputs);

function checkInputs(){
  bookBtn.disabled=true;
  bookBtn.className="";
  bookBtn.textContent="Book Appointment";

  if(!userName.value||!userPhone.value||!selectedDoctor||!selectedClinic) return;

  bookBtn.textContent="Checking Appointment...";
  const dup=appointmentsData.some(a=>
    a.name==userName.value.trim() &&
    a.phone==userPhone.value.trim() &&
    a.date==dateSelect.value
  );

  if(dup){
    bookBtn.className="duplicate";
    bookBtn.textContent="Duplicate Booking";
    return;
  }

  bookBtn.className="enabled";
  bookBtn.textContent="Book Appointment";
  bookBtn.disabled=false;
}

bookBtn.onclick=()=>{
  fetch(scriptURL+"?action=submitAppointment",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:userName.value.trim(),
      phone:userPhone.value.trim(),
      doctor:selectedDoctor,
      clinic:selectedClinic,
      date:dateSelect.value
    })
  }).then(()=>location.reload());
};
</script>
</body>
</html>
