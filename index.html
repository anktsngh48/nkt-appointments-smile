<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smile Dental Hospital</title>

<style>

#preloader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6f9;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

#preloader p{
max-width:420px;
margin:auto;
font-size:18px;
font-weight:700;
color:#007bff;
line-height:1.6;
}

/* BODY */

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
cursor:pointer;
}

.header span{
display:block;
font-size:14px;
font-weight:400;
margin-top:3px;
}

/* CONTAINER */

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* LABEL */

label{
font-weight:600;
display:block;
margin-top:15px;
}

/* DOCTOR */

.doctorSection{
display:flex;
align-items:flex-start;
gap:12px;
margin-top:4px;
}

.doctorButtons{
flex:1;
display:flex;
flex-wrap:wrap;
gap:8px;
align-content:flex-start;
}

.doctorButtons button{

width:120px;
height:60px;

border:1px solid #007bff;
background:white;

border-radius:8px;

cursor:pointer;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

font-size:13px;
}

.doctorButtons button span{
font-size:11px;
}

.doctorButtons button.selected{
background:#007bff;
color:white;
}

#doctorImage{
width:100px;
height:130px;
object-fit:cover;
border-radius:6px;
display:none;
}

/* CLINICS */

.clinicButtons{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:6px;
}

.clinicButtons button{
border:1px solid #007bff;
background:white;
border-radius:6px;
padding:8px 12px;
font-size:13px;
cursor:pointer;
}

.clinicButtons button.selected{
background:#007bff;
color:white;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;
}

/* BUTTON */

#bookBtn{
width:100%;
padding:14px;
margin-top:20px;
border-radius:8px;
border:none;
background:#28a745;
color:white;
font-size:15px;
cursor:pointer;
}

#bookBtn:disabled{
background:#ccc;
}

/* TOKEN */

.tokenInfo{
margin-top:15px;
font-weight:bold;
color:#007bff;
text-align:center;
}

.hiddenInput{
opacity:0;
position:absolute;
height:0;
width:0;
}

</style>
</head>

<body>

<div id="preloader">
<p>
नित्यमध्मान तां तांस्तु व्याधिभिश्च विवर्जितः।<br>
रसैश्च दन्तमूलानां रूक्षैराचाम्य विक्रियाम्॥
</p>
</div>

<div class="header" id="headerBar">
Smile Dental Hospital
<span id="headerAddress"></span>
</div>

<input type="password" id="adminInput" class="hiddenInput">

<div class="container">

<div class="card">

<label>Doctor</label>

<div class="doctorSection">

<div class="doctorButtons" id="doctorButtons"></div>

<img id="doctorImage">

</div>

<label>Clinic</label>
<div class="clinicButtons" id="clinicButtons"></div>

<label>Name</label>
<input id="userName">

<label>Phone</label>
<input id="userPhone">

<label>Address</label>
<input id="userAddress">

<label>Date</label>
<select id="dateSelect"></select>

<div class="tokenInfo" id="tokenAvailable">
Token Available: 1
</div>

<button id="bookBtn" disabled>
Book Appointment
</button>

</div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[];
let selectedDoctor="";
let selectedClinic="";
let adminPassword="";
let bookingState="idle";

const doctorButtons=document.getElementById("doctorButtons");
const clinicButtons=document.getElementById("clinicButtons");
const doctorImage=document.getElementById("doctorImage");

const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const userAddress=document.getElementById("userAddress");

const dateSelect=document.getElementById("dateSelect");
const tokenAvailable=document.getElementById("tokenAvailable");
const bookBtn=document.getElementById("bookBtn");
const headerAddress=document.getElementById("headerAddress");

const adminInput=document.getElementById("adminInput");

window.addEventListener("load",function(){

setTimeout(()=>{
document.getElementById("preloader").style.display="none";
},5000);

loadSettings();

});

async function loadSettings(){

const res=await fetch(scriptURL+"?action=getSettings");
settingsData=await res.json();

settingsData.forEach(r=>{
if(r[0]==="AdminPassword"){
adminPassword=r[1];
}
});

setupDoctors();
setupClinics();
setupDates();

}

function setupDoctors(){

const doctors=settingsData.filter(r=>r[0]==="Doctor");

doctors.forEach((d,i)=>{

const btn=document.createElement("button");

btn.innerHTML=d[1]+"<span>"+(d[4]||"")+"</span>";

btn.onclick=()=>{

selectedDoctor=d[1];

doctorImage.src=d[2]||"";
doctorImage.style.display=d[2]?"block":"none";

Array.from(doctorButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

updateToken();
checkInputs();

};

doctorButtons.appendChild(btn);

if(i===0)btn.click();

});

}

function setupClinics(){

const clinics=settingsData.filter(r=>r[0]==="Clinic");

clinics.forEach((c,i)=>{

const btn=document.createElement("button");

btn.innerText=c[1];

btn.onclick=()=>{

selectedClinic=c[1];
headerAddress.innerText=c[2]||"";

Array.from(clinicButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

updateToken();
checkInputs();

};

clinicButtons.appendChild(btn);

if(i===0)btn.click();

});

}

function setupDates(){

const today=new Date();
const tomorrow=new Date(today.getTime()+86400000);

[today,tomorrow].forEach(d=>{

const opt=document.createElement("option");

opt.value=formatDate(d);
opt.text=opt.value;

dateSelect.appendChild(opt);

});

dateSelect.onchange=updateToken;

}

function formatDate(d){

return String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();

}

async function updateToken(){

if(!selectedDoctor || !selectedClinic) return;

const date=dateSelect.value;

const res=await fetch(scriptURL+"?action=getToken&doctor="+selectedDoctor+"&clinic="+selectedClinic+"&date="+date);

const data=await res.json();

tokenAvailable.innerText="Token Available: "+data.token;

}

[userName,userPhone,userAddress].forEach(el=>el.addEventListener("input",checkInputs));

async function checkInputs(){

if(!(userName.value && userPhone.value && userAddress.value)){
bookBtn.disabled=true;
bookBtn.innerText="Book Appointment";
bookingState="idle";
return;
}

bookBtn.disabled=true;
bookBtn.innerText="Checking Appointment";
bookingState="checking";

const date=dateSelect.value;

const res=await fetch(scriptURL+"?action=checkDuplicate&phone="+userPhone.value+"&doctor="+selectedDoctor+"&clinic="+selectedClinic+"&date="+date);

const data=await res.json();

if(data.duplicate){

bookBtn.innerText="Duplicate Appointment";
bookBtn.disabled=true;
bookingState="duplicate";

}else{

bookBtn.innerText="Book Appointment";
bookBtn.disabled=false;
bookingState="ready";

}

}

bookBtn.onclick=async()=>{

if(bookingState!=="ready") return;

const payload={
name:userName.value,
phone:userPhone.value,
doctor:selectedDoctor,
clinic:selectedClinic,
address:userAddress.value,
date:dateSelect.value
};

const res=await fetch(scriptURL,{
method:"POST",
body:JSON.stringify(payload)
});

const data=await res.json();

alert("Appointment booked. Token: "+data.token);

location.reload();

};

document.getElementById("headerBar").onclick=()=>{
adminInput.focus();
};

adminInput.addEventListener("input",()=>{
if(adminInput.value===adminPassword){
window.location="https://duckduckgo.com";
}
});

</script>

</body>
</html>
