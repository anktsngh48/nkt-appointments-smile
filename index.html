<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE Dental Clinic</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f4f6f9;
}

.header {
  background-color: #007bff;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

label {
  font-size: 14px;
  font-weight: 600;
  margin-top: 15px;
  display: block;
}

select, input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

select:focus, input:focus {
  outline: none;
  border-color: #007bff;
}

button {
  padding: 14px;
  width: 100%;
  border: none;
  margin-top: 20px;
  font-size: 16px;
  border-radius: 8px;
  transition: 0.3s;
}

button:disabled {
  background-color: #cccccc;
  color: white;
}

button.enabled {
  background-color: #28a745;
  color: white;
}

img {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 10px;
  margin-top: 10px;
}

.address {
  margin-top: 6px;
  font-size: 14px;
  color: #555;
}

.token {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  color: #007bff;
}
</style>
</head>

<body>

<div class="header" onclick="adminLogin()">
SMILE Dental Clinic
</div>

<div class="container">
<div class="card">

<div id="doctorContainer"></div>
<img id="doctorImage" style="display:none;"/>

<label>Choose Clinic</label>
<select id="clinicSelect"></select>
<div id="clinicAddress" class="address"></div>

<label>Enter Your Name</label>
<input type="text" id="userName" placeholder="Your name">

<label>Select Date</label>
<div id="dateContainer"></div>

<button id="bookBtn" disabled>Book Appointment</button>

<div id="tokenDisplay" class="token"></div>

</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzBvHQb57X36iLzh2eFbvl890eU-pmzMyzD0HkOWN4Ruz4egavClFATfR79e3wD5EL5/exec";
let settingsData = [];

fetch(scriptURL + "?action=getSettings")
.then(res => res.json())
.then(data => {
  settingsData = data;
  initialize();
});

function initialize() {

  const doctors = settingsData.filter(r => r[0] === "Doctor");
  const clinics = settingsData.filter(r => r[0] === "Clinic");
  const dateModeRow = settingsData.find(r => r[0] === "DateMode");
  const dateMode = dateModeRow ? dateModeRow[1] : "dropdown";

  // Doctors
  if (doctors.length === 1) {
    document.getElementById("doctorContainer").innerHTML =
      "<label>Doctor</label><p><b>" + doctors[0][1] + "</b></p>";
    showDoctorImage(doctors[0][2]);
  } else {
    let select = "<label>Select Doctor</label><select id='doctorSelect'>";
    doctors.forEach(d => {
      select += "<option value='" + d[1] + "' data-img='" + d[2] + "'>" + d[1] + "</option>";
    });
    select += "</select>";
    document.getElementById("doctorContainer").innerHTML = select;
    showDoctorImage(doctors[0][2]);
    document.getElementById("doctorSelect").addEventListener("change", doctorChanged);
  }

  // Clinics
  const clinicSelect = document.getElementById("clinicSelect");
  clinics.forEach(c => {
    const option = document.createElement("option");
    option.value = c[1];
    option.text = c[1];
    option.setAttribute("data-address", c[2]);
    clinicSelect.appendChild(option);
  });

  updateAddress();
  clinicSelect.addEventListener("change", updateAddress);

  // Date
  if (dateMode === "dropdown") {
    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);
    const dayAfter = new Date();
    dayAfter.setDate(today.getDate() + 2);

    document.getElementById("dateContainer").innerHTML =
      "<select id='dateSelect'>" +
      "<option value='" + today.toDateString() + "'>Today</option>" +
      "<option value='" + tomorrow.toDateString() + "'>Tomorrow</option>" +
      "<option value='" + dayAfter.toDateString() + "'>Day After Tomorrow</option>" +
      "</select>";
  } else {
    document.getElementById("dateContainer").innerHTML =
      "<input type='date' id='dateSelect'>";
  }

  document.getElementById("bookBtn").addEventListener("click", submitForm);
  document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", validateForm);
    el.addEventListener("change", validateForm);
  });
}

function validateForm() {
  const name = document.getElementById("userName").value.trim();
  const date = document.getElementById("dateSelect").value;
  const clinic = document.getElementById("clinicSelect").value;
  const doctor = document.getElementById("doctorSelect") ? 
    document.getElementById("doctorSelect").value : true;

  const btn = document.getElementById("bookBtn");

  if (name && date && clinic && doctor) {
    btn.disabled = false;
    btn.classList.add("enabled");
  } else {
    btn.disabled = true;
    btn.classList.remove("enabled");
  }
}

function showDoctorImage(url) {
  if (url) {
    const img = document.getElementById("doctorImage");
    img.src = url;
    img.style.display = "block";
  }
}

function doctorChanged() {
  const select = document.getElementById("doctorSelect");
  const img = select.options[select.selectedIndex].getAttribute("data-img");
  showDoctorImage(img);
}

function updateAddress() {
  const select = document.getElementById("clinicSelect");
  const address = select.options[select.selectedIndex].getAttribute("data-address");
  document.getElementById("clinicAddress").innerText = address;
}

function submitForm() {

  const name = document.getElementById("userName").value;
  const doctor = document.getElementById("doctorSelect") ? 
    document.getElementById("doctorSelect").value :
    document.querySelector("#doctorContainer p").innerText;

  const clinicSelect = document.getElementById("clinicSelect");
  const clinic = clinicSelect.value;
  const address = clinicSelect.options[clinicSelect.selectedIndex].getAttribute("data-address");
  const date = document.getElementById("dateSelect").value;

  fetch(scriptURL + "?action=submitAppointment&name=" + name +
        "&doctor=" + doctor +
        "&clinic=" + clinic +
        "&address=" + address +
        "&date=" + date)
  .then(res => res.text())
  .then(token => {

    document.getElementById("tokenDisplay").innerHTML =
      "Your Token Number: " + token;

    // WhatsApp Confirmation
    const message = 
      "Hello " + name + 
      "%0AAppointment Confirmed at SMILE Dental Clinic" +
      "%0ADoctor: " + doctor +
      "%0AClinic: " + clinic +
      "%0ADate: " + date +
      "%0AToken: " + token;

    window.open("https://wa.me/?text=" + message, "_blank");
  });
}

function adminLogin() {
  const password = prompt("Enter Admin Password:");
  if (!password) return;

  fetch(scriptURL + "?action=checkPassword&password=" + password)
  .then(res => res.text())
  .then(result => {
    if (result === "true") {
      window.location.href = "https://duckduckgo.com";
    }
  });
}
</script>

</body>
</html>
