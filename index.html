<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE Dental Clinic</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

label{
font-weight:600;
margin-top:15px;
display:block;
}

/* DOCTOR AREA */

.doctorSection{
display:flex;
align-items:flex-start;
gap:15px;
}

.doctorButtons{
flex:1;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.doctorButtons button{
padding:8px 10px;
border-radius:6px;
border:1px solid #007bff;
background:white;
cursor:pointer;
font-size:13px;
color:black;
}

.doctorButtons button.selected{
background:#007bff;
color:white;
}

#doctorImage{
width:100px;
height:130px;
object-fit:cover;
border-radius:6px;
display:none;
}

#doctorQualifications{
margin-top:6px;
font-size:13px;
font-weight:500;
}

/* CLINIC BUTTONS */

.clinicButtons{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.clinicButtons button{
padding:8px 10px;
border-radius:6px;
border:1px solid #007bff;
background:white;
cursor:pointer;
font-size:13px;
color:black;
}

.clinicButtons button.selected{
background:#007bff;
color:white;
}

/* INPUTS */

input,select{
width:100%;
padding:12px;
margin-top:6px;
font-size:15px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

button.mainBtn{
padding:14px;
width:100%;
margin-top:20px;
font-size:15px;
border-radius:8px;
border:none;
cursor:pointer;
background:#28a745;
color:white;
}

button.mainBtn:disabled{
background:#ccc;
}

.tokenInfo{
margin-top:15px;
font-weight:bold;
color:#007bff;
text-align:center;
}

</style>
</head>

<body>

<div class="header">
SMILE Dental Clinic
</div>

<div class="container">

<div class="card">

<label>Doctor</label>

<div class="doctorSection">

<div style="flex:1">

<div class="doctorButtons" id="doctorButtons"></div>

<div id="doctorQualifications"></div>

</div>

<img id="doctorImage">

</div>

<label>Clinic</label>
<div class="clinicButtons" id="clinicButtons"></div>

<label>Name</label>
<input id="userName">

<label>Phone</label>
<input id="userPhone">

<label>Date</label>
<select id="dateSelect"></select>

<div class="tokenInfo" id="tokenAvailable">
Token: 1
</div>

<button id="bookBtn" class="mainBtn" disabled>
Book Appointment
</button>

</div>

</div>


<script>

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[];
let appointmentsData=[];
let selectedDoctor="";
let selectedClinic="";

const doctorButtons=document.getElementById("doctorButtons");
const clinicButtons=document.getElementById("clinicButtons");
const doctorImage=document.getElementById("doctorImage");
const doctorQualifications=document.getElementById("doctorQualifications");

const dateSelect=document.getElementById("dateSelect");
const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const bookBtn=document.getElementById("bookBtn");
const tokenAvailable=document.getElementById("tokenAvailable");


fetch(scriptURL+"?action=getSettings")
.then(r=>r.json())
.then(data=>{
settingsData=data;
setupDoctors();
setupClinics();
setupDates();
fetchAppointments();
});


/* DOCTORS */

function setupDoctors(){

const doctors=settingsData.filter(r=>r[0]==="Doctor");

doctors.forEach(d=>{

const btn=document.createElement("button");
btn.innerText=d[1];

btn.onclick=()=>{

selectedDoctor=d[1];

doctorImage.src=d[2]||"";
doctorImage.style.display=d[2]?"block":"none";

doctorQualifications.innerText=d[4]||"";

Array.from(doctorButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

checkInputs();

};

doctorButtons.appendChild(btn);

});

if(doctors.length){
doctorButtons.children[0].click();
}

}


/* CLINICS */

function setupClinics(){

const clinics=settingsData.filter(r=>r[0]==="Clinic");

clinics.forEach(c=>{

const btn=document.createElement("button");
btn.innerText=c[1];

btn.onclick=()=>{

selectedClinic=c[1];

Array.from(clinicButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

checkInputs();

};

clinicButtons.appendChild(btn);

});

if(clinics.length){
clinicButtons.children[0].click();
}

}


/* DATES */

function setupDates(){

const today=new Date();
const tomorrow=new Date(today.getTime()+86400000);

const dates=[
{t:"Today",d:formatDate(today)},
{t:"Tomorrow",d:formatDate(tomorrow)}
];

dates.forEach(x=>{
const opt=document.createElement("option");
opt.value=x.d;
opt.text=x.t+" ("+x.d+")";
dateSelect.appendChild(opt);
});

dateSelect.onchange=updateToken;

}

function formatDate(d){
return String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
}


/* APPOINTMENTS */

function fetchAppointments(){

fetch(scriptURL+"?action=getAppointments")
.then(r=>r.json())
.then(data=>{

appointmentsData=[];

for(let i=1;i<data.length;i++){

appointmentsData.push({
name:data[i][0],
phone:data[i][1],
date:data[i][5],
token:Number(data[i][6])
});

}

updateToken();

});

}


/* TOKEN */

function updateToken(){

const date=dateSelect.value;

let maxToken=0;

appointmentsData.forEach(a=>{
if(a.date===date){
if(a.token>maxToken){
maxToken=a.token;
}
}
});

tokenAvailable.innerText="Token: "+(maxToken+1);

checkInputs();

}


/* INPUT CHECK */

[userName,userPhone].forEach(el=>el.addEventListener("input",checkInputs));

function checkInputs(){

bookBtn.disabled=!(
userName.value &&
userPhone.value &&
selectedDoctor &&
selectedClinic
);

}


/* BOOK */

bookBtn.onclick=()=>{

const url=scriptURL+
"?action=submitAppointment"+
"&name="+encodeURIComponent(userName.value)+
"&phone="+encodeURIComponent(userPhone.value)+
"&doctor="+encodeURIComponent(selectedDoctor)+
"&clinic="+encodeURIComponent(selectedClinic)+
"&address="+encodeURIComponent(selectedClinic)+
"&date="+encodeURIComponent(dateSelect.value);

fetch(url)
.then(r=>r.text())
.then(token=>{

alert("Appointment booked. Token: "+token);
location.reload();

});

};

</script>

</body>
</html>
