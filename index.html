```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile Dental Hospital</title>

<style>

/* PRELOADER */

#preloader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6f9;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

#preloader p{
font-size:18px;
font-weight:700;
color:#007bff;
line-height:1.4;
}

/* BODY */

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.header span{
display:block;
font-size:14px;
font-weight:400;
margin-top:3px;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* LABEL */

label{
font-weight:600;
display:block;
margin-top:15px;
}

/* DOCTOR SECTION */

.doctorSection{
display:flex;
align-items:flex-start;
gap:12px;
margin-top:4px;
}

.doctorButtons{
flex:1;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.doctorButtons button{
border:1px solid #007bff;
background:white;
border-radius:6px;
padding:6px 8px;
cursor:pointer;
font-size:12px;
color:black;
text-align:left;
}

.doctorButtons button span{
display:block;
font-size:10px;
color:#444;
}

.doctorButtons button.selected{
background:#007bff;
color:white;
}

.doctorButtons button.selected span{
color:white;
}

#doctorImage{
width:100px;
height:130px;
object-fit:cover;
border-radius:6px;
display:none;
}

/* CLINICS */

.clinicButtons{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:6px;
}

.clinicButtons button{
border:1px solid #007bff;
background:white;
border-radius:6px;
padding:8px 10px;
font-size:13px;
cursor:pointer;
color:black;
}

.clinicButtons button.selected{
background:#007bff;
color:white;
}

/* INPUTS */

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;
}

/* BUTTON */

#bookBtn{
width:100%;
padding:14px;
margin-top:20px;
border-radius:8px;
border:none;
background:#28a745;
color:white;
font-size:15px;
cursor:pointer;
}

#bookBtn:disabled{
background:#ccc;
}

/* TOKEN */

.tokenInfo{
margin-top:15px;
font-weight:bold;
color:#007bff;
text-align:center;
}

</style>
</head>

<body>

<div id="preloader">
<p>
नित्यमध्मान तां तांस्तु व्याधिभिश्च विवर्जितः।<br>
रसैश्च दन्तमूलानां रूक्षैराचाम्य विक्रियाम्॥
</p>
</div>

<div class="header">
Smile Dental Hospital
<span id="headerAddress"></span>
</div>

<div class="container">

<div class="card">

<label>Doctor</label>

<div class="doctorSection">

<div class="doctorButtons" id="doctorButtons"></div>

<img id="doctorImage">

</div>

<label>Clinic</label>
<div class="clinicButtons" id="clinicButtons"></div>

<label>Name</label>
<input id="userName">

<label>Phone</label>
<input id="userPhone">

<label>Address</label>
<input id="userAddress">

<label>Date</label>
<select id="dateSelect"></select>

<div class="tokenInfo" id="tokenAvailable">
Token: 1
</div>

<button id="bookBtn" disabled>
Book Appointment
</button>

</div>
</div>

<script>

window.addEventListener("load",function(){
setTimeout(()=>{document.getElementById("preloader").style.display="none"},3000);
});

const scriptURL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData=[];
let appointmentsData=[];
let selectedDoctor="";
let selectedClinic="";
let selectedClinicAddress="";

const doctorButtons=document.getElementById("doctorButtons");
const clinicButtons=document.getElementById("clinicButtons");
const doctorImage=document.getElementById("doctorImage");

const userName=document.getElementById("userName");
const userPhone=document.getElementById("userPhone");
const userAddress=document.getElementById("userAddress");

const dateSelect=document.getElementById("dateSelect");
const tokenAvailable=document.getElementById("tokenAvailable");
const bookBtn=document.getElementById("bookBtn");
const headerAddress=document.getElementById("headerAddress");

fetch(scriptURL+"?action=getSettings")
.then(r=>r.json())
.then(data=>{
settingsData=data;
setupDoctors();
setupClinics();
setupDates();
fetchAppointments();
});

/* DOCTORS */

function setupDoctors(){

const doctors=settingsData.filter(r=>r[0]==="Doctor");

doctors.forEach(d=>{

const btn=document.createElement("button");

btn.innerHTML=d[1]+"<span>"+(d[4]||"")+"</span>";

btn.onclick=()=>{

selectedDoctor=d[1];

doctorImage.src=d[2]||"";
doctorImage.style.display=d[2]?"block":"none";

Array.from(doctorButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

checkInputs();

};

doctorButtons.appendChild(btn);

});

if(doctors.length){
doctorButtons.children[0].click();
}

}

/* CLINICS */

function setupClinics(){

const clinics=settingsData.filter(r=>r[0]==="Clinic");

clinics.forEach(c=>{

const btn=document.createElement("button");

btn.innerText=c[1];

btn.onclick=()=>{

selectedClinic=c[1];
selectedClinicAddress=c[2]||"";

headerAddress.innerText=selectedClinicAddress;

Array.from(clinicButtons.children).forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");

checkInputs();

};

clinicButtons.appendChild(btn);

});

if(clinics.length){
clinicButtons.children[0].click();
}

}

/* DATE */

function setupDates(){

const today=new Date();
const tomorrow=new Date(today.getTime()+86400000);

const dates=[
{t:"Today",d:formatDate(today)},
{t:"Tomorrow",d:formatDate(tomorrow)}
];

dates.forEach(x=>{
const opt=document.createElement("option");
opt.value=x.d;
opt.text=x.t+" ("+x.d+")";
dateSelect.appendChild(opt);
});

dateSelect.onchange=updateToken;

}

function formatDate(d){
return String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
}

/* APPOINTMENTS */

function fetchAppointments(){

fetch(scriptURL+"?action=getAppointments")
.then(r=>r.json())
.then(data=>{

appointmentsData=[];

for(let i=1;i<data.length;i++){

appointmentsData.push({
date:data[i][5],
token:Number(data[i][6])
});

}

updateToken();

});

}

/* TOKEN */

function updateToken(){

const date=dateSelect.value;

let maxToken=0;

appointmentsData.forEach(a=>{
if(a.date===date){
if(a.token>maxToken){
maxToken=a.token;
}
}
});

tokenAvailable.innerText="Token: "+(maxToken+1);

checkInputs();

}

/* INPUT CHECK */

[userName,userPhone,userAddress].forEach(el=>el.addEventListener("input",checkInputs));

function checkInputs(){

bookBtn.disabled=!(
userName.value &&
userPhone.value &&
userAddress.value &&
selectedDoctor &&
selectedClinic
);

}

/* BOOK */

bookBtn.onclick=()=>{

const url=scriptURL+
"?action=submitAppointment"+
"&name="+encodeURIComponent(userName.value)+
"&phone="+encodeURIComponent(userPhone.value)+
"&doctor="+encodeURIComponent(selectedDoctor)+
"&clinic="+encodeURIComponent(selectedClinic)+
"&address="+encodeURIComponent(userAddress.value)+
"&date="+encodeURIComponent(dateSelect.value);

fetch(url)
.then(r=>r.text())
.then(token=>{
alert("Appointment booked. Token: "+token);
location.reload();
});

};

</script>

</body>
</html>
```
