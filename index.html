<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NKT Appointment</title>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  padding:0;
  background:#f5f5f5;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
  background:#ffffff;
}

.doctorSection{
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  gap:12px;
}

.doctorLeft{
  flex:1;
}

#doctorButtons button{
  display:block;
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

#doctorButtons button.selected{
  background:#007bff;
  color:#fff;
}

#doctorQualifications{
  margin-top:8px;
  font-size:14px;
  color:#333;
}

.doctorRight{
  flex-shrink:0;
}

#doctorImage{
  width:100px;
  height:auto;
  display:none;
}

input, select, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  box-sizing:border-box;
}

#tokenDisplay{
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}
</style>
</head>

<body>
<div class="container">

  <h2>Book Appointment</h2>

  <div class="doctorSection">
    <div class="doctorLeft">
      <div id="doctorButtons"></div>
      <div id="doctorQualifications"></div>
    </div>
    <div class="doctorRight">
      <img id="doctorImage">
    </div>
  </div>

  <input type="date" id="dateInput">
  <input type="text" id="nameInput" placeholder="Patient Name">
  <input type="tel" id="phoneInput" placeholder="Phone Number">

  <div id="tokenDisplay"></div>

  <button id="submitBtn" disabled>Submit</button>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settingsData = [];
let selectedDoctor = "";

const doctorButtons = document.getElementById("doctorButtons");
const doctorQualifications = document.getElementById("doctorQualifications");
const doctorImage = document.getElementById("doctorImage");
const dateInput = document.getElementById("dateInput");
const nameInput = document.getElementById("nameInput");
const phoneInput = document.getElementById("phoneInput");
const tokenDisplay = document.getElementById("tokenDisplay");
const submitBtn = document.getElementById("submitBtn");

fetch(SCRIPT_URL)
  .then(r => r.json())
  .then(d => {
    settingsData = d.settings;
    setupDoctors();
  });

function setupDoctors(){
  doctorButtons.innerHTML = "";

  settingsData
    .filter(r => r[0] === "Doctor")
    .forEach(d => {

      const name = d[1] || "";
      const image = d[2] || "";
      const qualification = d[3] || "";

      const btn = document.createElement("button");
      btn.textContent = name;

      btn.onclick = () => {
        selectedDoctor = name;

        doctorQualifications.textContent = qualification;
        doctorQualifications.style.display = qualification ? "block" : "none";

        doctorImage.src = image;
        doctorImage.style.display = image ? "block" : "none";

        [...doctorButtons.children].forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");

        checkToken();
      };

      doctorButtons.appendChild(btn);
    });

  if(doctorButtons.firstChild){
    doctorButtons.firstChild.click();
  }
}

function checkToken(){
  const date = dateInput.value;
  if(!date) return;

  fetch(SCRIPT_URL + "?mode=token&date=" + date)
    .then(r => r.json())
    .then(d => {
      const nextToken = d.maxToken + 1;
      tokenDisplay.textContent = "Token: " + nextToken;
      checkInputs();
    });
}

function checkInputs(){
  submitBtn.disabled = !(selectedDoctor && dateInput.value && nameInput.value && phoneInput.value);
}

dateInput.onchange = checkToken;
nameInput.oninput = checkInputs;
phoneInput.oninput = checkInputs;

submitBtn.onclick = () => {
  const payload = {
    doctor: selectedDoctor,
    date: dateInput.value,
    name: nameInput.value,
    phone: phoneInput.value
  };

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  }).then(() => {
    alert("Appointment Saved");
    location.reload();
  });
};
</script>

</body>
</html>
