<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>NKT Appointment</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:#ffffff;
}

#topHeader{
background:#d32f2f;
color:white;
text-align:center;
font-size:20px;
padding:12px;
font-weight:bold;
cursor:pointer;
}

#container{
padding:16px;
}

#doctorImage{
width:100%;
max-width:320px;
display:none;
margin:auto;
margin-bottom:10px;
}

.doctorButtons{
display:flex;
flex-direction:column;
gap:10px;
}

.doctorBtn{
background:#f44336;
color:white;
border:none;
border-radius:6px;
font-size:16px;
padding:10px;
width:100%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
font-size:15px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

#tokenBox{
margin-top:14px;
font-size:16px;
font-weight:bold;
}

#bookBtn{
margin-top:14px;
width:100%;
padding:12px;
font-size:16px;
background:#f44336;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
opacity:.5;
}

#bookBtn.enabled{
opacity:1;
}

</style>

</head>

<body>

<div id="topHeader">|| ॐ त्र्यम्बकं यजामहे सुगन्धिं पुष्टिवर्धनम् ||</div>

<div id="container">

<img id="doctorImage">

<div class="doctorButtons" id="doctorButtons"></div>

<select id="clinic"></select>

<select id="date"></select>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<input id="address" placeholder="Address">

<div id="tokenBox">Token Available: </div>

<button id="bookBtn" disabled>Book Appointment</button>

</div>

<input type="password" id="adminPass" style="position:absolute;left:-9999px">

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycby6hVR6u3QCODIrQ8lRybb4AusvejbUxaLPLs4rt8LiQs1YJKVvQ4LqvlwKTBshH-VjOA/exec";

let settings=[];
let appointments=[];
let selectedDoctor="";
let slotLimit=0;

async function init(){

let res=await fetch(SCRIPT_URL+"?action=getData");
let data=await res.json();

settings=data.settings;
appointments=data.appointments;

loadDoctors();
loadClinics();
loadDates();

checkToken();

}

function loadDoctors(){

let div=document.getElementById("doctorButtons");
div.innerHTML="";

settings.forEach((r,i)=>{

let btn=document.createElement("button");
btn.className="doctorBtn";
btn.innerText=r[0];

btn.onclick=()=>{
selectedDoctor=r[0];
slotLimit=r[3];
showDoctorImage(r[4]);
checkToken();
validateForm();
};

div.appendChild(btn);

if(i===0){
selectedDoctor=r[0];
slotLimit=r[3];
showDoctorImage(r[4]);
}

});

}

function showDoctorImage(url){

let img=document.getElementById("doctorImage");

if(url){
img.src=url;
img.style.display="block";
}else{
img.style.display="none";
}

}

function loadClinics(){

let sel=document.getElementById("clinic");
sel.innerHTML="";

let clinics=[...new Set(settings.map(r=>r[1]))];

clinics.forEach(c=>{
let op=document.createElement("option");
op.value=c;
op.text=c;
sel.appendChild(op);
});

}

function loadDates(){

let sel=document.getElementById("date");
sel.innerHTML="";

let dates=[...new Set(settings.map(r=>r[2]))];

dates.forEach(d=>{
let op=document.createElement("option");
op.value=d;
op.text=d;
sel.appendChild(op);
});

}

function validateForm(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();

let btn=document.getElementById("bookBtn");

if(name && phone.length===10 && address){
btn.disabled=false;
btn.classList.add("enabled");
}else{
btn.disabled=true;
btn.classList.remove("enabled");
}

}

document.getElementById("phone").addEventListener("input",function(){

this.value=this.value.replace(/\D/g,"").slice(0,10);

validateForm();

});

document.getElementById("name").addEventListener("input",validateForm);
document.getElementById("address").addEventListener("input",validateForm);

document.getElementById("clinic").addEventListener("change",checkToken);
document.getElementById("date").addEventListener("change",checkToken);

function checkToken(){

let clinic=document.getElementById("clinic").value;
let date=document.getElementById("date").value;

let max=0;

appointments.forEach(r=>{

if(r[1]==selectedDoctor && r[2]==clinic && r[3]==date){

let t=parseInt(r[4]);
if(t>max)max=t;

}

});

let token=max+1;

document.getElementById("tokenBox").innerText="Token Available: "+token;

}

document.getElementById("bookBtn").onclick=async function(){

let btn=this;

btn.innerText="Checking Appointment";
btn.disabled=true;

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let clinic=document.getElementById("clinic").value;
let date=document.getElementById("date").value;

let res=await fetch(SCRIPT_URL+"?action=checkDuplicate&phone="+phone+"&date="+date);

let data=await res.json();

if(data.duplicate){

alert("Duplicate Entry");

btn.innerText="Book Appointment";
validateForm();

return;

}

await fetch(SCRIPT_URL+"?action=book&name="+name+"&phone="+phone+"&address="+address+"&doctor="+selectedDoctor+"&clinic="+clinic+"&date="+date);

btn.innerText="Booked";

}

document.getElementById("topHeader").onclick=function(){

let input=document.getElementById("adminPass");

input.style.left="0";
input.focus();

}

document.getElementById("adminPass").addEventListener("keydown",function(e){

if(e.key==="Enter"){

let pass=this.value;

this.value="";
this.style.left="-9999px";

document.activeElement.blur();

fetch(SCRIPT_URL+"?action=checkAdmin&pass="+pass)
.then(r=>r.json())
.then(d=>{

if(d.ok){
window.location="anktsngh48.github.io/nkt-edit-sheet";
}

});

}

});

init();

</script>

</body>
</html>
